<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>霧峰教會司琴平台 - 連續翻譜版</title>
    <style>
        :root {
            --primary: #2c3e50;
            --bg-color: #222; 
            --sidebar-width: 320px;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            background-color: var(--bg-color); 
            overflow: hidden; 
        }

        /* --- 左側控制欄 --- */
        .sidebar {
            width: var(--sidebar-width);
            background: #fff;
            padding: 60px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            z-index: 10;
            transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), padding 0.4s;
            flex-shrink: 0;
            overflow: hidden;
            white-space: nowrap;
        }
        
        .sidebar.collapsed {
            width: 0;
            padding-left: 0;
            padding-right: 0;
            border: none;
        }

        h2 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.5rem; }
        
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; color: #555; margin-bottom: 5px; font-weight: bold; }
        .control-group input {
            width: 100%; padding: 12px; font-size: 1.2rem; 
            border: 2px solid #ddd; border-radius: 5px; outline: none;
        }

        .btn {
            background: var(--primary); color: white; border: none; padding: 15px;
            width: 100%; border-radius: 8px; font-size: 1.2rem; cursor: pointer; font-weight: bold;
        }
        .btn:hover { background: #34495e; }
        .btn-full { background: #27ae60; margin-top: 5px; font-size: 1rem; padding: 10px; }
        
        .instructions {
            font-size: 0.9rem; color: #666; background: #f9f9f9; 
            padding: 15px; border-radius: 8px; line-height: 1.6;
            white-space: normal;
        }

        .toggle-btn {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            background: rgba(0,0,0,0.6); color: white; border: none;
            padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 1.2rem;
        }

        /* --- 右側樂譜顯示區 (保持單頁) --- */
        .viewer {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            height: 100%;
            overflow: hidden;
        }

        #sheet-music {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
            display: none;
        }

        .page-indicator {
            position: absolute;
            bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 8px 16px; border-radius: 20px;
            font-size: 1rem; pointer-events: none;
            display: none;
        }

        .msg-box { color: #888; font-size: 1.5rem; text-align: center; }

        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; width: 100%; transition: transform 0.3s ease;}
            .sidebar.collapsed { transform: translateX(-100%); width: 100%; padding: 60px 20px; }
        }
    </style>
</head>
<body>

<button class="toggle-btn" onclick="toggleSidebar()">☰ 設定</button>

<div class="sidebar" id="sidebar">
    <h2>🎹 司琴樂譜平台</h2>
    
    <div class="control-group">
        <label>聖詩編號 (例如: 43, 105)</label>
        <input type="text" id="hymnNo" placeholder="多首請用逗點隔開" onkeydown="checkEnter(event)">
    </div>

    <button class="btn" onclick="loadMusic()">🔍 搜尋並顯示</button>
    <button class="btn btn-full" onclick="toggleFullScreen()">⛶ 切換全螢幕</button>

    <div class="instructions">
        <strong>💡 翻譜說明：</strong>
        <ul>
            <li><strong>翻頁：</strong>支援藍芽翻譜器、鍵盤(方向鍵/空白鍵)、滑鼠滾輪、或點擊螢幕左右側。</li>
            <li><strong>多首模式：</strong>輸入 `43, 105` 會將 43 首接續 105 首，翻頁時會自動跨首。</li>
        </ul>
    </div>
</div>

<div class="viewer" id="viewer" onclick="handleTouch(event)">
    <div id="message" class="msg-box">請輸入聖詩號碼並搜尋</div>
    <img id="sheet-music" src="" alt="樂譜">
    <div id="pageIndicator" class="page-indicator">1 / 1</div>
</div>

<script>
    let allHymnPages = []; // 存儲所有搜尋到的圖片路徑
    let currentIndex = 0;
    
    // --- 1. 搜尋並載入多首樂譜 ---
    async function loadMusic() {
        const input = document.getElementById('hymnNo').value.trim();
        const msg = document.getElementById('message');
        const img = document.getElementById('sheet-music');
        const indicator = document.getElementById('pageIndicator');

        if (!input) { msg.innerText = "請輸入號碼"; return; }

        msg.innerText = "🔍 正在合併載入多首樂譜...";
        img.style.display = 'none';
        indicator.style.display = 'none';

        // 解析輸入的編號
        const hymnNumbers = input.replace(/，/g, ',').split(',').map(s => s.trim()).filter(s => s !== "");
        allHymnPages = [];

        // 依序處理每一首聖詩
        for (const no of hymnNumbers) {
            const pageChecks = [];
            // 每首聖詩掃描 0-8 頁
            for (let i = 0; i <= 8; i++) {
                const path = `./hymn/伴奏${no}-${i}.jpg`;
                pageChecks.push(checkImage(path));
            }
            const results = await Promise.all(pageChecks);
            // 將存在的圖片按順序加入總陣列
            results.forEach(r => {
                if (r.exists) allHymnPages.push(r.path);
            });
        }

        if (allHymnPages.length > 0) {
            currentIndex = 0;
            showPage(0);
            msg.style.display = 'none';
            img.style.display = 'block';
            indicator.style.display = 'block';
            toggleSidebar(true); // 載入完成自動縮回
        } else {
            msg.innerText = `❌ 找不到輸入的聖詩檔案\n(請確認檔案路徑是否正確)`;
            msg.style.display = 'block';
        }
    }

    // 檢查圖片是否存在
    function checkImage(path) {
        return new Promise((resolve) => {
            const temp = new Image();
            temp.onload = () => resolve({ path: path, exists: true });
            temp.onerror = () => resolve({ path: path, exists: false });
            temp.src = path;
        });
    }

    // --- 2. 顯示頁面 (完全相容原本邏輯) ---
    function showPage(index) {
        if (allHymnPages.length === 0) return;
        if (index < 0) index = 0;
        if (index >= allHymnPages.length) index = allHymnPages.length - 1;
        
        currentIndex = index;
        const img = document.getElementById('sheet-music');
        const indicator = document.getElementById('pageIndicator');
        
        img.src = allHymnPages[currentIndex];
        indicator.innerText = `${currentIndex + 1} / ${allHymnPages.length}`;
        
        // 每次換頁將容器捲動回頂部 (以防萬一有溢出)
        document.getElementById('viewer').scrollTop = 0;
    }

    function nextPage() { showPage(currentIndex + 1); }
    function prevPage() { showPage(currentIndex - 1); }

    // --- 3. 翻譜器與鍵盤支援 ---
    document.addEventListener('keydown', (e) => {
        if (document.activeElement.tagName === 'INPUT') return;
        // 兼容所有常見翻譜器的按鍵訊號
        switch(e.key) {
            case 'ArrowRight': case 'ArrowDown': case 'PageDown': case ' ': case 'Enter':
                e.preventDefault(); nextPage(); break;
            case 'ArrowLeft': case 'ArrowUp': case 'PageUp': case 'Backspace':
                e.preventDefault(); prevPage(); break;
        }
    });

    // --- 4. 滑鼠滾輪翻頁 ---
    let wheelTimeout;
    document.addEventListener('wheel', (e) => {
        const sidebar = document.getElementById('sidebar');
        if (!sidebar.classList.contains('collapsed') && e.target.closest('.sidebar')) return;
        if (wheelTimeout) return;
        if (e.deltaY > 0) nextPage(); else prevPage();
        wheelTimeout = setTimeout(() => { wheelTimeout = null; }, 300);
    }, { passive: true });

    // --- 5. 螢幕點擊翻頁 (左右半區) ---
    function handleTouch(e) {
        if (e.target.closest('.toggle-btn')) return;
        const width = window.innerWidth;
        if (e.clientX > width / 2) nextPage(); else prevPage();
    }

    // --- 6. 介面控制 ---
    function toggleSidebar(forceCollapse) {
        const sidebar = document.getElementById('sidebar');
        if (forceCollapse === true) {
            sidebar.classList.add('collapsed');
        } else if (forceCollapse === false) {
            sidebar.classList.remove('collapsed');
        } else {
            sidebar.classList.toggle('collapsed');
        }
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    function checkEnter(e) { if (e.key === 'Enter') { document.activeElement.blur(); loadMusic(); } }
</script>

</body>
</html>
