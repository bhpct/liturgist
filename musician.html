<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>霧峰教會司琴平台</title>
    <style>
        :root {
            --primary: #2c3e50;
            --bg-color: #222; 
            --sidebar-width: 320px;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            margin: 0; display: flex; height: 100vh; 
            background-color: var(--bg-color); overflow: hidden; 
        }

        /* --- 左側控制欄 --- */
        .sidebar {
            width: var(--sidebar-width); background: #fff;
            padding: 60px 20px 20px 20px; display: flex; flex-direction: column; gap: 15px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5); z-index: 10;
            transition: width 0.4s ease, padding 0.4s; flex-shrink: 0; overflow: hidden;
        }
        
        .sidebar.collapsed { width: 0; padding: 0; border: none; }

        h2 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.5rem; text-align: center; }

        .control-group label { display: block; color: #555; margin-bottom: 5px; font-weight: bold; }
        .control-group input {
            width: 100%; padding: 12px; font-size: 1.2rem; 
            border: 2px solid #ddd; border-radius: 5px; outline: none;
        }

        .btn {
            background: var(--primary); color: white; border: none; padding: 15px;
            width: 100%; border-radius: 8px; font-size: 1.2rem; cursor: pointer; font-weight: bold;
        }
        .btn-full { background: #27ae60; margin-top: 5px; font-size: 0.9rem; padding: 10px; }
        
        .instructions {
            font-size: 0.85rem; color: #444; background: #f0f4f8; 
            padding: 15px; border-radius: 8px; line-height: 1.6; white-space: normal;
            border-left: 4px solid var(--primary);
        }

        /* 頁尾版權樣式 */
        .sidebar-footer {
            margin-top: auto; /* 推到最下面 */
            padding-top: 20px;
            font-size: 0.75rem;
            color: #999;
            text-align: center;
            line-height: 1.4;
            white-space: normal;
        }
        .sidebar-footer a { color: #7f8c8d; text-decoration: underline; }

        .toggle-btn {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            background: rgba(0,0,0,0.6); color: white; border: none;
            padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 1.2rem;
        }

        /* --- 右側樂譜顯示區 --- */
        .viewer {
            flex: 1; position: relative; display: flex;
            justify-content: center; align-items: center;
            background-color: var(--bg-color); height: 100%; overflow: hidden;
        }

        #sheet-music { max-width: 100%; max-height: 100vh; object-fit: contain; display: none; }

        .page-indicator {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 8px 16px; border-radius: 20px; font-size: 1rem; pointer-events: none; display: none;
        }

        .msg-box { color: #888; font-size: 1.5rem; text-align: center; }

        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; width: 100%; transition: transform 0.3s ease;}
            .sidebar.collapsed { transform: translateX(-100%); width: 100%; }
        }
    </style>
</head>
<body>

<button class="toggle-btn" onclick="toggleSidebar()">☰ 設定</button>

<div class="sidebar" id="sidebar">
    <h2>霧峰教會司琴平台</h2>
    
    <div class="control-group">
        <label>聖詩編號 (多首輸入)</label>
        <input type="text" 
               id="hymnNo" 
               inputmode="decimal" 
               placeholder="例如: 43, 105 或 43.105" 
               onkeydown="checkEnter(event)">
    </div>

    <button class="btn" onclick="loadMusic()">🔍 搜尋並顯示</button>
    <button id="fs-btn" class="btn btn-full" onclick="toggleFullScreen()">⛶ 電腦/Android 全螢幕</button>

    <div class="instructions">
        <strong>💡 分隔輸入說明：</strong><br>
        • <strong>電腦：</strong>使用 <strong>逗點 (,)</strong>、<strong>點 (.)</strong> 或 <strong>空白鍵</strong>。<br>
        • <strong>手機/平板：</strong>數字鍵盤上的 <strong>點 (.)</strong> 或 <strong>空白鍵</strong>。
    </div>

    <!-- 頁尾版權與資料來源 -->
    <div class="sidebar-footer">
        © 霧峰教會 2025<br><br>
        資料來源：台灣基督長老教會(新)聖詩伴奏版<br>
        <a href="https://churchmusic.pct.org.tw/download.htm" target="_blank">PCT 教會音樂網</a>
    </div>
</div>

<div class="viewer" id="viewer" onclick="handleTouch(event)">
    <div id="message" class="msg-box">請輸入聖詩號碼並搜尋</div>
    <img id="sheet-music" src="" alt="樂譜">
    <div id="pageIndicator" class="page-indicator">1 / 1</div>
</div>

<script>
    let allHymnPages = [];
    let currentIndex = 0;

    // --- 裝置判斷 ---
    window.onload = function() {
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const fsBtn = document.getElementById('fs-btn');
        if (isIOS) {
            fsBtn.innerText = "ℹ️ iOS 全螢幕教學";
            fsBtn.style.backgroundColor = "#95a5a6";
            fsBtn.onclick = function() { 
                alert("iOS 限制無法直接切換全螢幕。\n\n建議：點擊 Safari 下方的「分享」圖示，選擇「加入主畫面」，之後從桌面開啟即可達成 100% 全螢幕看譜。");
            };
        }
    };

    // --- 搜尋邏輯 ---
    async function loadMusic() {
        const input = document.getElementById('hymnNo').value.trim();
        const msg = document.getElementById('message');
        const img = document.getElementById('sheet-music');
        const indicator = document.getElementById('pageIndicator');

        if (!input) { return; }

        msg.innerText = "🔍 正在載入聖詩樂譜...";
        img.style.display = 'none';
        indicator.style.display = 'none';

        // 解析邏輯：支援半形逗點、全形逗點、點、空格
        const hymnNumbers = input.split(/[,，.\s]+/).filter(s => s !== "");
        allHymnPages = [];

        for (const no of hymnNumbers) {
            const pageChecks = [];
            for (let i = 0; i <= 8; i++) {
                const path = `./hymn/伴奏${no}-${i}.jpg`;
                pageChecks.push(checkImage(path));
            }
            const results = await Promise.all(pageChecks);
            results.forEach(r => {
                if (r.exists) allHymnPages.push(r.path);
            });
        }

        if (allHymnPages.length > 0) {
            currentIndex = 0;
            showPage(0);
            msg.style.display = 'none';
            img.style.display = 'block';
            indicator.style.display = 'block';
            toggleSidebar(true); 
        } else {
            msg.innerText = `❌ 找不到聖詩樂譜\n(輸入內容: ${input})`;
            msg.style.display = 'block';
        }
    }

    function checkImage(path) {
        return new Promise((resolve) => {
            const temp = new Image();
            temp.onload = () => resolve({ path: path, exists: true });
            temp.onerror = () => resolve({ path: path, exists: false });
            temp.src = path;
        });
    }

    function showPage(index) {
        if (allHymnPages.length === 0) return;
        if (index < 0) index = 0;
        if (index >= allHymnPages.length) index = allHymnPages.length - 1;
        
        currentIndex = index;
        const img = document.getElementById('sheet-music');
        const indicator = document.getElementById('pageIndicator');
        
        img.src = allHymnPages[currentIndex];
        indicator.innerText = `${currentIndex + 1} / ${allHymnPages.length}`;
    }

    function nextPage() { showPage(currentIndex + 1); }
    function prevPage() { showPage(currentIndex - 1); }

    // --- 翻譜支援 (藍芽翻譜器/鍵盤/滾輪) ---
    document.addEventListener('keydown', (e) => {
        if (document.activeElement.tagName === 'INPUT') return;
        switch(e.key) {
            case 'ArrowRight': case 'ArrowDown': case 'PageDown': case ' ': case 'Enter':
                e.preventDefault(); nextPage(); break;
            case 'ArrowLeft': case 'ArrowUp': case 'PageUp': case 'Backspace':
                e.preventDefault(); prevPage(); break;
        }
    });

    // 螢幕左右點擊翻頁
    function handleTouch(e) {
        if (e.target.closest('.toggle-btn')) return;
        const width = window.innerWidth;
        if (e.clientX > width / 2) nextPage(); else prevPage();
    }

    function toggleSidebar(forceCollapse) {
        const sidebar = document.getElementById('sidebar');
        if (forceCollapse === true) sidebar.classList.add('collapsed');
        else if (forceCollapse === false) sidebar.classList.remove('collapsed');
        else sidebar.classList.toggle('collapsed');
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                alert("您的瀏覽器不支持自動全螢幕，請手動調整。");
            });
        } else {
            document.exitFullscreen();
        }
    }

    function checkEnter(e) { 
        if (e.key === 'Enter') { 
            document.activeElement.blur(); 
            loadMusic(); 
        } 
    }
</script>

</body>
</html>
