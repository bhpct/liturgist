<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>API 權限診斷工具</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #333; color: white; }
        input { padding: 10px; width: 300px; }
        button { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; font-weight: bold; }
        #result { margin-top: 20px; padding: 20px; background: #444; border: 1px solid #666; white-space: pre-wrap; font-family: monospace; }
        .error { color: #ff6b6b; }
        .success { color: #5ddc7e; }
    </style>
</head>
<body>
    <h2>🕵️ Google API 權限診斷</h2>
    <p>請輸入您的 Key，系統將直接詢問 Google：「這個 Key 開通了什麼服務？」</p>
    
    <input type="text" id="key" placeholder="貼上您的 API Key (AIza...)">
    <button onclick="diagnose()">開始診斷</button>

    <div id="result">等待測試...</div>

    <script>
        async function diagnose() {
            const key = document.getElementById('key').value.trim();
            const resultBox = document.getElementById('result');
            
            if (!key) { alert("請輸入 Key"); return; }
            
            resultBox.innerHTML = "⏳ 正在連線 Google 伺服器讀取模型清單...";

            try {
                // 嘗試列出所有可用模型
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await response.json();

                if (!response.ok) {
                    // 分析錯誤原因
                    let reason = "未知錯誤";
                    if (data.error) {
                        if (data.error.message.includes("API has not been used")) reason = "🔴 API 未啟用：請去 Google Cloud Console 啟用 'Generative Language API'";
                        else if (data.error.status === "PERMISSION_DENIED") reason = "🔴 權限不足：您的企業帳號管理員封鎖了 AI 存取，或 Key 已失效。";
                        else reason = `🔴 錯誤訊息：${data.error.message}`;
                    }
                    resultBox.innerHTML = `<span class="error">${reason}</span>\n\n完整回應:\n${JSON.stringify(data, null, 2)}`;
                } else {
                    // 成功，列出模型
                    const models = data.models.map(m => m.name).join("\n");
                    resultBox.innerHTML = `<span class="success">✅ 恭喜！Key 是有效的！</span>\n\n您的帳號可以看到以下模型 (請複製有 'generateContent' 功能的名稱給工程師):\n\n${models}`;
                }
            } catch (e) {
                resultBox.innerHTML = `<span class="error">❌ 網路連線失敗</span>\n原因：${e.message}\n(請確認您是否已將此網頁上傳至 GitHub Pages，本機執行會被瀏覽器阻擋)`;
            }
        }
    </script>
</body>
</html>
