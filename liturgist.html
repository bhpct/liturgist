<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霧峰教會禮拜司會平台</title>
    <style>
        /* ==================== */
        /* CSS 樣式區 (A4列印優化) */
        /* ==================== */
        :root {
            --primary: #2c3e50;
            --accent: #c0392b; /* 長老教會紅 */
            --stand-bg: #e67e22; /* 站立提示橘 */
        }
        /* 全域設定 */
        * { box-sizing: border-box; }
        body { font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; margin: 0; display: flex; height: 100vh; background: #eee; }
        
        /* --- 浮動切換按鈕 --- */
        .toggle-btn {
            position: absolute;
            top: 10px; left: 10px; z-index: 1000;
            background: var(--accent); color: white; border: none;
            padding: 8px 12px; border-radius: 5px; cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3); font-size: 1.2rem;
        }

        /* --- 左側設定欄 --- */
        .sidebar {
            width: 380px;
            background: var(--primary);
            color: white;
            padding: 50px 20px 20px 20px;
            overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        
        .sidebar.collapsed { transform: translateX(-100%); width: 0; padding: 0; overflow: hidden; }

        .control-group {
            background: rgba(255,255,255,0.05); padding: 15px;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
        }
        .control-group label { display: block; color: #bdc3c7; margin-bottom: 5px; font-size: 0.95em; }
        .control-group input, .control-group select, .control-group textarea {
            width: 100%; padding: 10px; border-radius: 4px; border: none; margin-bottom: 10px;
            font-size: 1em; font-family: inherit;
        }
        
        .radio-row { display: flex; align-items: center; gap: 20px; margin-bottom: 10px; }
        .radio-row label { display: flex; align-items: center; color: white; cursor: pointer; margin: 0; font-weight: normal; }
        .radio-row input { margin-right: 5px; width: auto; }

        .btn {
            background: var(--accent); color: white; border: none; padding: 12px;
            width: 100%; border-radius: 5px; font-size: 1.1em; cursor: pointer; font-weight: bold;
            transition: 0.2s;
        }
        .btn:hover { background: #a93226; }
        .btn-sec { background: #555; margin-top: 5px; }
        .btn-scan { background: #27ae60; font-size: 0.9em; padding: 8px; margin-bottom: 10px; }

        /* --- 右側預覽區 --- */
        .preview { flex: 1; padding: 40px; overflow-y: auto; background: white; position: relative; }
        
        .script-box { 
            max-width: 210mm; margin: auto; font-size: 18px; line-height: 1.6; 
            padding-bottom: 50px; background: white; box-shadow: 0 0 15px rgba(0,0,0,0.1); padding: 40px;
        }
        
        .header { text-align: center; border-bottom: 3px double #333; padding-bottom: 20px; margin-bottom: 30px; }
        .item { margin-bottom: 35px; break-inside: avoid; }
        .title { font-weight: bold; font-size: 1.25em; color: var(--primary); border-bottom: 2px solid #ddd; display: block; margin-bottom: 12px; padding-bottom: 5px; }
        .bridge { background: #f8f9fa; padding: 10px 15px; border-left: 6px solid #999; display: block; margin-bottom: 12px; color: #444; font-style: italic; }
        .content { white-space: pre-wrap; display: block; color: #000; padding-left: 10px; border-left: 1px solid #eee; margin-left: 5px; }
        .note { display: block; font-size: 0.9em; color: #666; border: 1px dashed #bbb; padding: 15px; background: #fffdf0; margin-top: 15px; line-height: 1.6; }
        
        /* 圖片容器 (聖詩 & 啟應文通用) */
        .img-container { margin-top: 15px; text-align: center; }
        .img-container img { max-width: 100%; height: auto; border: 1px solid #ccc; margin-bottom: 5px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }

        .emergency-footer { margin-top: 50px; padding: 20px; background-color: #ffe6e6; border: 2px solid #ffcccc; color: #c0392b; font-weight: bold; text-align: center; border-radius: 8px; page-break-inside: avoid; }
        
        .stand { background: var(--stand-bg); color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.8em; margin-right: 8px; vertical-align: middle; }
        .ruan { color: #c0392b; font-weight: bold; text-decoration: underline; }
        .api-status { font-size: 0.85em; margin-bottom: 10px; padding: 5px; border-radius: 4px; display: none; }
        .status-ok { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-err { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* --- 手機版 RWD --- */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; height: auto; }
            .sidebar { width: 100%; position: relative; display: none; }
            .sidebar.active { display: flex; }
            .toggle-btn { position: fixed; top: 10px; left: 10px; }
            .preview { padding: 10px; width: 100%; margin-top: 50px; }
            .script-box { padding: 15px; width: 100%; box-shadow: none; }
        }

        /* --- 列印設定 (A4) --- */
        @page { size: A4; margin: 2cm; }
        @media print {
            .sidebar, .btn, .control-group, .btn-scan, #apiStatus, .toggle-btn { display: none !important; }
            body, html, .preview { background: white; margin: 0; padding: 0; height: auto; width: 100%; overflow: visible; display: block; }
            .script-box { max-width: 100%; width: 100%; margin: 0; padding: 0; border: none; box-shadow: none; font-size: 13pt; line-height: 1.5; }
            .ruan { color: black; font-weight: bold; text-decoration: none; border-bottom: 1px dotted black; }
            .stand { color: black; border: 1px solid black; background: white; font-weight: bold; padding: 1px 5px; }
            .title { color: black; border-bottom: 1px solid black; }
            .bridge { background: white; border-left: 3px solid #ccc; color: #000; font-style: italic; }
            .header { border-bottom: 1px solid black; margin-bottom: 20px; }
            .item { page-break-inside: avoid; margin-bottom: 25px; }
            .note { border: 1px dashed #666; background: white; color: #000; }
            .emergency-footer { border: 1px solid #000; color: #000; background: #fff; }
            .img-container img { max-width: 90%; max-height: 23cm; margin: 10px auto; display: block; box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

<button class="toggle-btn" onclick="toggleSidebar()">☰ 設定</button>

<div class="sidebar" id="sidebar">
    <h2 style="margin-top: 0;">⛪ 禮拜內容設定版面</h2>
    
    <div class="control-group">
        <label style="color:#ffcc00;">🔑 Google API Key</label>
        <p style="font-size:0.8em; color:#ccc; margin-top:0;">請貼上 Key (系統自動記憶)。</p>
        <input type="password" id="apiKey" placeholder="AIzaSy..." onchange="saveKey()">
        
        <label>AI 模型</label>
        <div id="scanStatus" class="api-status"></div>
        <button class="btn btn-scan" onclick="scanModels()">🔍 偵測可用模型</button>
        <select id="aiModel">
            <option value="gemini-2.0-flash" selected>Gemini 2.0 Flash</option>
            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
        </select>
    </div>

    <div class="control-group">
        <label>場次</label>
        <select id="serviceType" onchange="updateUI()">
            <option value="tw">第一場：台語 (09:30)</option>
            <option value="ch">第二場：華語 (11:00)</option>
        </select>

        <label>日期</label>
        <input type="date" id="date" onchange="autoWeek()">
        <select id="week">
            <option value="1">第一週 (主禱文)</option>
            <option value="2">第二週 (使徒信經)</option>
            <option value="3">第三週 (新的誡命)</option>
            <option value="4">第四週 (上帝十條誡)</option>
            <option value="5">第五週 (信仰告白)</option>
        </select>
    </div>

    <div class="control-group">
        <label>主禮/證道</label>
        <input type="text" id="preacher" value="宋承祐 牧師">
        <label>信息主題</label>
        <input type="text" id="topic" placeholder="例如：你是哪一黨？">
        <label>經文範圍</label>
        <input type="text" id="scripture" placeholder="例如：哥林多前書 1:10-18">
    </div>

    <div class="control-group" id="hymnGroup">
        <label>聖詩 (第一首)</label>
        <input type="text" id="hymn1" placeholder="例如：305">
        <label>讚美 (獻詩單位)</label>
        <input type="text" id="praiseTeam" value="聖歌隊">
        <label>回應詩 (第二首)</label>
        <input type="text" id="hymn2" placeholder="例如：197">
        
        <label>祝福差遣/頌榮 (第三首)</label>
        <div class="radio-row">
            <label><input type="radio" name="endType" value="sending" checked> 祝福差遣</label>
            <label><input type="radio" name="endType" value="doxology"> 頌榮</label>
        </div>
        <input type="text" id="hymn3" placeholder="例如：402">
    </div>

    <div class="control-group" id="rrGroup">
        <label>啟應文 (第幾篇)</label>
        <input type="text" id="respNo" placeholder="例如：60">
    </div>

    <div class="control-group">
        <label style="color:#ffcc00;">🙏 司會祈禱重點 (輸入梗概即可)</label>
        <textarea id="customPrayer" rows="4" placeholder="例如：為OOO手術平安..."></textarea>
    </div>

    <button class="btn" onclick="generate()">⚡ 產生司會腳本</button>
    <button class="btn btn-sec" onclick="window.print()">🖨️ 列印 / 下載 PDF</button>
</div>

<div class="preview">
    <div id="output" class="script-box">
        <div style="text-align:center; color:#888; margin-top:100px;">
            <h3>歡迎進入 霧峰教會禮拜司會平台<br>1. 貼上 API Key 啟動系統 (#api)<br>2. 點擊「產生司會腳本」獲得司會資料<br>3. 點擊左上角「☰」可收合選單</h3>
        </div>
    </div>
</div>

<script>
    const texts = {
        tw: {
            1: `【主的祈禱文 (台)】\n阮在天裡的父，願你的名聖，你的國臨到，你的旨意得成，佇地裡親像佇天裡。\n阮的日食今仔日給阮。赦免阮的辜負，親像阮也有赦免辜負阮的人。\n莫得導阮入佇試，著救阮脫離彼個歹的。\n因為國，權能，榮光攏是你所有，\n代代無盡。阿們。\n（台語漢字本 太6：9-13）`,
            2: `【使徒信經 (台)】\n我信上帝，全能的父，創造天、地的主宰。\n我信耶穌基督，上帝的獨生子，咱的主。祂對聖神投胎，對在室女馬利亞出世，佇本丟彼拉多任內受苦，釘十字架，死，埋葬，落陰府，第三日對死人中復活，升天，今坐佇全能父上帝的大旁，祂欲對遐閣來審判活人及死人。\n我信聖神，聖閣公同的教會，聖徒的相通，罪的赦免，肉體的復活，永遠的活命。\n阿們。`,
            3: `【新的誡命 (台)】\n你著盡心、盡性、盡意疼主你的上帝。此個誡是大的，亦是頭一個，第二個亦相親像，是講，你著疼厝邊親像自己。此兩條誡是全律法及先知的總根頭。\n(台語漢字本 太22:37-40)\n我用新的誡命互恁，就是恁著相疼，親像我曾疼恁，恁亦著按呢相疼。恁若相疼，眾人欲對按呢知恁是我的學生。\n(台語漢字本 約13:34-35)`,
            4: `【上帝十條誡 (台)】\n第1誡：我以外，你呣通有別的上帝。\n第2誡：呣通為著家己雕刻偶像，不論天頂、地上，及地下、水內所有的物攏呣通做伊的像。呣通敬拜伊，也呣通服事伊，因為我耶和華--你的上帝，斷斷呣容允用別個上帝匹配我。怨恨我者，我歸咎伊的罪，對父到子，到三四代；疼我、守我誡命者，我施恩互伊，直到千代。\n第3誡：呣通濫糝稱耶和華--你的上帝的名；因為濫糝稱伊的名的人，耶和華的確無掠伊做無罪。\n第4誡：當記得安息日，守伊做聖。六日內應該著磨做你一切的工，獨獨第七日就是向耶和華--你的上帝來守的安息。此日你及你的子、查某子、奴僕、女婢、精牲，以及踮佇你中間的出外人，一切的工攏呣通做；因為六日內，耶和華創造天、地、海，及彼中間萬物，第七日就息，所以耶和華賜福佇安息日，設立伊做聖。\n第5誡：著孝敬你的老父你的老母，互你的日子佇耶和華--你的上帝所賞賜你的地得著久長。\n第6誡：呣通害死人。\n第7誡：呣通行姦淫。\n第8誡：呣通偷提。\n第9誡：呣通做假的干證，陷害你的厝邊。\n第10誡：呣通貪你的厝邊的厝；也呣通貪你的厝邊的某、奴僕、女婢、牛、驢，以及你的厝邊一切所有的。\n(台語漢字本 出20:3-17)`,
            5: `【台灣基督長老教會信仰告白 (台)】\n阮信上帝，創造、統治人與萬物的獨一真神。祂是歷史與世界的主，施行審判和拯救。祂的子對聖神投胎，對在室女馬利亞出世做人，做咱的兄弟，就是人類的救主耶穌基督，對祂的受苦、釘十字架死、復活，顯明上帝的仁愛與公義，使咱與上帝復和。祂的神，就是聖神，站在咱中間，賞賜氣力，使阮在萬百姓中做見證，直到主復來。\n\n阮信，聖經是上帝所啟示的，記載祂的救贖，做阮信仰與生活的準則。\n\n阮信，教會是上帝百姓的團契，受召來宣揚耶穌基督的拯救，做和解的使者，是普世的，復釘根在本地，認同所有的住民，通過愛與受苦，來成做盼望的記號。\n\n阮信，人對上帝的恩典來悔改，罪得赦免，用虔誠、仁愛、與獻身的生活歸榮光上帝。\n\n阮信，上帝使人有尊嚴、才能，以及鄉土，來有份於祂的創造，負責任和祂相與管理世界。\n\n對如此，人有社會、政治及經濟的制度，也有文藝、科學，復有追求真神的心。總是人有罪，誤用這些恩賜，破壞人、萬物、與上帝的關係。所以，人著倚靠耶穌基督的救恩。祂要使人對罪惡中得著釋放，使受壓制的得著自由、平等，在基督成做新創造的人，使世界成做祂的國，充滿公義、平安與歡喜。\n阿們`
        },
        ch: {
            1: `【主禱文 (華)】\n我們在天上的父：願人都尊祢的名為聖。\n願祢的國度降臨；願祢的旨意行在地上，\n如同行在天上。我們日用的飲食，今日賜給我們。免我們的債，如同我們免了人的債。不叫我們陷入試探；救我們脫離那惡者。因為國度、權柄、榮耀，全是祢的，直到永遠。阿們！\n（和合本修訂版 太6：9-13）`,
            2: `【使徒信經 (華)】\n我信上帝，全能的父，創造天地的主。\n\n我信我主耶穌基督，上帝的獨生子。祂從聖靈感孕，由童貞女馬利亞所生，在本丟彼拉多手下受難，被釘於十字架，受死，埋葬，降在陰間，第三天從死人中復活，升天，坐在全能父上帝的右邊，將來必從那裡降臨，審判活人與死人。\n我信聖靈，聖而公的教會，聖徒的相通，罪的赦免，身體的復活，永遠的生命。\n阿們。`,
            3: `【新的誡命 (華)】\n你要盡心、盡性、盡意愛主你的上帝。這是誡命中的第一，且是最大的 。其次也相倣，就是要愛人如己。這兩條誡命是律法和先知一切道理的總綱。\n(和合本 太22:37-40)\n我賜給你們一條新命令，乃是叫你們彼此相愛；我怎樣愛你們，你們也要怎樣相愛。你們若有彼此相愛的心，眾人因此就認出你們是我的門徒了。  \n(和合本 約13:34-35)`,
            4: `【十誡 (華)】\n第1誡：除了我以外，你不可有別的神。\n第2誡：不可為自己雕刻偶像，也不可做什麼形像彷彿上天、下地，和地底下、水中的百物。 不可跪拜那些像，也不可事奉他，因為我耶和華─你的神是忌邪的神。恨我的，我必追討他的罪，自父及子，直到三四代； 愛我、守我誡命的，我必向他們發慈愛，直到千代。\n第3誡：不可妄稱耶和華─你神的名；因為妄稱耶和華名的，耶和華必不以他為無罪。\n第4誡：當記念安息日，守為聖日。六日要勞碌做你一切的工，但第七日是向耶和華─你神當守的安息日。這一日你和你的兒女、僕婢、牲畜，並你城裡寄居的客旅，無論何工都不可做； 因為六日之內，耶和華造天、地、海，和其中的萬物，第七日便安息，所以耶和華賜福與安息日，定為聖日。\n第5誡：當孝敬父母，使你的日子在耶和華─你神所賜你的地上得以長久。\n第6誡：不可殺人。\n第7誡：不可姦淫。\n第8誡：不可偷盜。\n第9誡：不可作假見證陷害人。\n第10誡：不可貪戀人的房屋；也不可貪戀人的妻子、僕婢、牛驢，並他一切所有的。\n(和合本 出20:3-17)`,
            5: `【台灣基督長老教會信仰告白 (華)】\n我們信上帝，創造、統治人與萬物的獨一真神。祂是歷史與世界的主，施行審判和拯救。祂的兒子，從聖靈投胎，由童貞女馬利亞降生為人，成為我們的弟兄，就是人類的救主耶穌基督，藉著祂的受苦、釘十字架死、復活，彰顯了上帝的仁愛與公義，使我們與上帝復和。祂的靈，就是聖靈，住在我們中間，賜能力，使我們在萬民中做見證，直到主再來。\n\n我們信，聖經是上帝所啟示的，記載祂的救贖，做為我們信仰與生活的準則。\n\n我們信，教會是上帝子民的團契，蒙召來宣揚耶穌基督的拯救，做和解的使者，是普世的，且根植於本地，認同所有的住民，通過愛與受苦，而成為盼望的記號。\n\n我們信，人藉著上帝的恩典而悔改，罪得赦免，以虔誠、仁愛與獻身的生活歸榮耀於上帝。\n\n我們信，上帝賜給人有尊嚴、才能，以及鄉土，使人有份於祂的創造，負責任與祂一起管理世界。\n\n因此，人有社會、政治及經濟的制度，也有文藝、科學，且有追求真神的心。但是人有罪，誤用這些恩賜，破壞人、萬物、與上帝的關係。所以，人當倚靠耶穌基督的救恩。祂要使人從罪惡中得釋放，使受壓制的人得自由、平等，在基督裡成為新創造的人，使世界成為祂的國度，充滿公義、平安與喜樂。\n阿們`
        }

    async function scanModels() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const statusDiv = document.getElementById('scanStatus');
        const select = document.getElementById('aiModel');
        if (!apiKey) { alert("請先輸入 API Key"); return; }
        statusDiv.style.display = 'block'; statusDiv.className = 'api-status'; statusDiv.innerHTML = '⏳ 連線中...';
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
            const data = await response.json();
            if (!response.ok) { statusDiv.className = 'api-status status-err'; statusDiv.innerHTML = `⚠️ 失敗: ${data.error ? data.error.message : 'Check Key'}`; return; }
            if (data.models) {
                const validModels = data.models.filter(m => m.supportedGenerationMethods.includes("generateContent"));
                if (validModels.length > 0) {
                    select.innerHTML = "";
                    validModels.forEach(m => {
                        if(m.name.includes("gemini")) {
                            const cleanName = m.name.replace("models/", "");
                            const option = document.createElement("option");
                            option.value = cleanName; option.text = `✅ ${cleanName}`;
                            if (cleanName === "gemini-2.0-flash") option.selected = true;
                            select.appendChild(option);
                        }
                    });
                    statusDiv.className = 'api-status status-ok'; statusDiv.innerHTML = `🎉 偵測成功！`;
                }
            }
        } catch (e) { statusDiv.className = 'api-status status-err'; statusDiv.innerHTML = `⚠️ 錯誤: ${e.message}`; }
    }

    async function getAIPrayer(key, type, custom, preacher) {
        const model = document.getElementById('aiModel').value;
        const lang = type === 'tw' ? '台語' : '華語';
        const pronoun = type === 'tw' ? '使用「阮」代表我們(排除上帝)，嚴禁使用「咱」' : '使用「我們」';
        const context = type === 'tw' ? '司會帶領的禮拜中段祈禱' : '敬拜團主領的祈禱';
        const prompt = `你現在是台灣基督長老教會的禮拜服事者。請撰寫一篇主日禮拜中，帶領公眾的禱告文「${context}」。語言：${lang}。代名詞：${pronoun} (重要)。內容包含：0. 公眾認罪。1. 感謝上帝。2. 為國家公義、教會合一、家庭平安代禱。3. 特別代禱：${custom}。4. 為本主日證道牧師 ${preacher} 的信息與家庭代禱。5. 結尾：奉主耶穌的名 阿們。」請直接輸出禱告文。`;
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            if (!response.ok) { const errData = await response.json(); return `(生成失敗: ${errData.error ? errData.error.message : response.statusText})`; }
            const data = await response.json();
            if (data.candidates && data.candidates[0].content) {
                let text = data.candidates[0].content.parts[0].text;
                if(type === 'tw') text = text.replace(/阮/g, '<span class="ruan">阮</span>');
                return text;
            }
            return "(無內容)";
        } catch (e) { return `(連線失敗: ${e.message})`; }
    }

    // --- 通用圖片偵測函式 (支援 Hymn 與 RR) ---
    async function getImages(prefix, number, maxPages=10) {
        if (!number) return "";
        let imagesHtml = "";
        const checks = [];
        
        // 修正路徑邏輯：如果是 RR，路徑是 RR/RR13-0.jpg；如果是聖詩，路徑是 hymn/伴奏43-0.jpg
        let folder = prefix === "RR" ? "RR" : "hymn";
        let filePrefix = prefix === "RR" ? "RR" : "伴奏";
        
        for (let i = 0; i <= maxPages; i++) {
            const path = `./${folder}/${filePrefix}${number}-${i}.jpg`;
            const checkPromise = new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve({ idx: i, path: path, exists: true });
                img.onerror = () => resolve({ idx: i, path: path, exists: false });
                img.src = path;
            });
            checks.push(checkPromise);
        }
        const results = await Promise.all(checks);
        results.forEach(res => {
            if (res.exists) imagesHtml += `<img src="${res.path}" alt="${prefix}${number}-${res.idx}">`;
        });
        if (imagesHtml) return `<div class="img-container">${imagesHtml}</div>`;
        return "";
    }
